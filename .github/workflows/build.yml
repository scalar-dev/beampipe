name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/master'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build \
          --build-arg GEOLITE2_LICENSE_KEY=${{ secrets.GEOLITE2_LICENSE_KEY }} \
          -t scalardev/beampipe:$GITHUB_RUN_NUMBER \
          -t scalardev/beampipe:latest \
          .

    - name: Push to Docker Hub
      if: github.ref == 'refs/heads/master'
      run: |
        docker push scalardev/beampipe:$GITHUB_RUN_NUMBER
        docker push scalardev/beampipe:latest

  web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
         cd ./web
         yarn
         yarn build
